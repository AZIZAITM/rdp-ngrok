name: Windows RDP with Ngrok

on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
    - name: Setup user
      run: |
        net user runneradmin P@ssw0rd123
        $group = "Administrators"
        $user = "runneradmin"
        if (!(net localgroup $group | Select-String $user)) {
        net localgroup $group $user /add
        }

    - name: Enable RDP
      run: |
        reg add "HKLM\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

    - name: Download ngrok
      run: |
        Invoke-WebRequest https://bin.equinox.io/c/bNyj1mQVY4c/ngrok-v3-stable-windows-amd64.zip -OutFile ngrok.zip
        Expand-Archive ngrok.zip

    - name: Authenticate ngrok
      run: |
        .\ngrok\ngrok.exe config add-authtoken $env:NGROK_AUTH_TOKEN

    - name: Start ngrok tunnel
      run: |
        Start-Process -NoNewWindow -FilePath ".\ngrok\ngrok.exe" -ArgumentList "tcp 3389"

    - name: Show connection info
      run: |
        Invoke-WebRequest http://127.0.0.1:4040/api/tunnels -OutFile tunnels.json
        type tunnels.json

    - name: Keep alive
      run: |
        Start-Sleep -Seconds 21600
